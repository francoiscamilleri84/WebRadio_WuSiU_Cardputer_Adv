[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino
lib_deps = 
	khoih-prog/ESP_WifiManager@^1.12.1
	m5stack/M5Cardputer@^1.1.1
	m5stack/M5GFX
	m5stack/M5Unified@^0.2.17
	earlephilhower/ESP8266Audio@^2.4.1
include_dir = include
upload_port = 